<!DOCTYPE html>
<html>
<head>
<meta content="text/html; charset=UTF-8" http-equiv="content-type">
<style type="text/css">
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap');

  @page {
    size: A4;
    margin: 20mm 22mm 20mm 22mm;
  }
  body {
    background-color: #ffffff;
    max-width: none;
    padding: 0;
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 12pt;
    color: #1e293b;
    line-height: 1.4;
    font-variant-numeric: tabular-nums;
  }
  h1 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 22pt;
    color: #1e293b;
    line-height: 1.2;
    padding-top: 10pt;
    padding-bottom: 6pt;
    page-break-after: avoid;
  }
  h2 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 18pt;
    color: #1e293b;
    line-height: 1.1;
    padding-top: 18pt;
    padding-bottom: 0pt;
    margin-bottom: 4pt;
    page-break-after: avoid;
  }
  h3 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 14pt;
    color: #1e293b;
    line-height: 1.4;
    padding-top: 8pt;
    padding-bottom: 0pt;
    margin-bottom: 0pt;
    page-break-after: avoid;
  }
  h4 {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 12pt;
    color: #666666;
    line-height: 1.4;
    padding-top: 14pt;
    padding-bottom: 4pt;
    page-break-after: avoid;
  }
  p {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 12pt;
    color: #1e293b;
    margin: 0;
    padding-top: 6pt;
    padding-bottom: 6pt;
    line-height: 1.4;
  }
  .logo { padding-bottom: 6pt; }
  .subtitle {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 11pt;
    color: #2563EB;
    line-height: 1.0;
    padding-bottom: 0pt;
  }

  /* --- BADGE --- */
  .badge {
    background-color: #2563EB;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 10pt;
    padding: 2px 6px;
    border-radius: 8px;
  }
  .badge-orange {
    background-color: #ea580c;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 10pt;
    padding: 2px 6px;
    border-radius: 8px;
  }
  .badge-green {
    background-color: #16a34a;
    color: #ffffff;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 10pt;
    padding: 2px 6px;
    border-radius: 8px;
  }

  a {
    color: #2563EB;
  }

  hr {
    border: none;
    border-top: 1px solid #e2e8f0;
    margin: 16pt 0;
  }
  strong, b { font-weight: 700; }
  em, i { font-style: italic; }
  ul, ol {
    margin: 0;
    padding: 0;
    padding-left: 16pt;
  }
  li {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 11pt;
    color: #1e293b;
    padding-top: 4pt;
    padding-bottom: 4pt;
    line-height: 1.4;
  }
  table {
    border-collapse: separate;
    border-spacing: 0;
    width: 100%;
    margin: 10pt 0 24pt 0;
    font-family: 'Montserrat', sans-serif;
    font-size: 9pt;
    line-height: 1.3;
  }
  th {
    background-color: #E2E8F0;
    color: #1e293b;
    font-weight: 700;
    font-size: 9pt;
    padding: 12px 8px;
    text-align: left;
    border: none;
    border-bottom: 1px solid #CBD5E1;
  }
  tr:first-child th:first-child { border-top-left-radius: 12px; }
  tr:first-child th:last-child { border-top-right-radius: 12px; }
  td {
    font-weight: 500;
    font-size: 9pt;
    color: #1e293b;
    padding: 12px 8px;
    border: none;
    border-bottom: 1px solid #e2e8f0;
    vertical-align: top;
  }
  .num {
    text-align: right;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  code {
    background-color: #f1f5f9;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 9pt;
    color: #1e293b;
  }
  pre {
    background-color: #f8fafc;
    border: 1px solid #e2e8f0;
    border-left: 3px solid #2563EB;
    border-radius: 4px;
    padding: 14px;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 8.5pt;
    line-height: 1.5;
    white-space: pre-wrap;
    word-wrap: break-word;
    color: #1e293b;
  }

  /* --- CALLOUT BOXES --- */
  .key-point {
    background-color: #eff6ff;
    border-left: 3px solid #2563EB;
    border-radius: 12px;
    padding: 10px 14px;
    margin: 10pt 0;
  }
  .key-point p, .key-point li { font-size: 11pt; padding-top: 3pt; padding-bottom: 3pt; }

  .warning {
    background-color: #fff7ed;
    border-left: 3px solid #ea580c;
    border-radius: 12px;
    padding: 10px 14px;
    margin: 10pt 0;
  }
  .warning p, .warning li { font-size: 11pt; padding-top: 3pt; padding-bottom: 3pt; }

  /* --- PRICE / SUMMARY BOX --- */
  .price-box {
    background-color: #E2E8F0;
    border: none;
    border-radius: 12px;
    padding: 12px 14px;
    margin: 10pt 0;
    width: fit-content;
  }
  .price-box p { font-size: 11pt; padding-top: 3pt; padding-bottom: 3pt; }

  /* --- TEAM / CARD GRID (single row of gray cards) --- */
  .team-grid {
    display: flex;
    flex-wrap: nowrap;
    gap: 12px;
    margin: 12pt 0;
  }
  .team-grid .price-box {
    margin: 0;
    padding: 10px 12px;
    flex: 0 0 auto;
  }
  .team-grid .price-box p {
    font-size: 7.5pt;
    line-height: 1.5;
    white-space: nowrap;
  }

  /* --- TOC BOX --- */
  .toc-box {
    background-color: #E2E8F0;
    border-radius: 12px;
    padding: 20px 24px;
    margin: 12pt 0;
  }
  .toc-box a {
    color: #1e293b;
    font-weight: 500;
    text-decoration: none;
  }
  .toc-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding: 3pt 0;
    font-size: 10pt;
  }
  .toc-num {
    font-weight: 700;
    min-width: 26pt;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* --- TEAM CARD GRID (2 colonne) --- */
  .team-proposal-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin: 12pt 0;
  }
  .team-proposal-card {
    flex: 0 0 calc(50% - 6px);
    position: relative;
    background: #E2E8F0;
    border-radius: 12px;
    padding: 12px 14px;
    box-sizing: border-box;
  }
  .card-year {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 7pt;
    font-weight: 700;
    color: #1e293b;
    background-color: #CBD5E1;
    padding: 3px 6px;
    border-radius: 6px;
  }
  .card-name {
    font-weight: 700;
    font-size: 11pt;
    margin-bottom: 1pt;
    padding-right: 82px;
  }
  .card-role {
    font-size: 9pt;
    color: #475569;
    margin-bottom: 8pt;
  }
  .card-bio {
    font-size: 9pt;
    line-height: 1.4;
  }

  /* --- PAGE BREAK --- */
  .page-break {
    page-break-before: always;
  }

  /* --- SECTION LABEL (page break + uppercase label) --- */
  .section-label {
    font-family: 'Montserrat', sans-serif;
    font-weight: 800;
    font-size: 9pt;
    color: #2563EB;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-top: 20pt;
    padding-bottom: 2pt;
    display: block;
    page-break-before: always;
  }

  /* --- FOOTER --- */
  .doc-footer {
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 9pt;
    color: #94a3b8;
    text-align: center;
    padding-top: 8pt;
  }
</style>
</head>
<body>

</html>
